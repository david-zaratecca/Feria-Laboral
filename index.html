<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Feria Laboral Bilingüe</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js?render=6LcIqNAsAAAAAB8_NxqKz3aTJKx0sJDQgpglIsF0"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

    <div id="top-banner">
        <div class="brand-header">
            <div class="brand-mark">CA</div>
            <div>
                <div class="brand-title">Centro Colombo Americano</div>
            </div>
        </div>
    </div>

    <div id="container">
        <h2>Ingreso Feria Laboral</h2>
        <p class="subtitle">Ingresa tus datos para acceder al sistema</p>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="*******" required autocomplete="current-password">
            </div>

            <button type="submit" id="btnLogin">Iniciar Sesión</button>

            <div class="loading" id="loading">Verificando credenciales...</div>
        </form>
    </div>

    <div class="footer-note">
        <strong>Centro Colombo Americano</strong> · Feria Laboral Bilingüe
    </div>

    <!-- JS: _api.js DEBE cargarse antes de script.js -->
    <script src="js/_api.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
